    <style>
      body {
        background-color: #0f1511;
        background-image:
          linear-gradient(rgba(199, 255, 254, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(199, 255, 254, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
      }
      .chamfer-card {
        clip-path: polygon(
          0 0,
          100% 0,
          100% calc(100% - 20px),
          calc(100% - 20px) 100%,
          0 100%
        );
      }
      .scanline {
        background: linear-gradient(
          to bottom,
          transparent 50%,
          rgba(199, 255, 254, 0.02) 50%
        );
        background-size: 100% 4px;
        pointer-events: none;
      }
      .corner-bracket-tl {
        border-top: 2px solid #c7fffe;
        border-left: 2px solid #c7fffe;
        width: 12px;
        height: 12px;
        position: absolute;
        top: -2px;
        left: -2px;
      }
      .corner-bracket-tr {
        border-top: 2px solid #c7fffe;
        border-right: 2px solid #c7fffe;
        width: 12px;
        height: 12px;
        position: absolute;
        top: -2px;
        right: -2px;
      }

        left: -2px;

        height: 12px;
